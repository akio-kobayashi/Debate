<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Debate Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <h1>Debate Demo</h1>
        <div class="topbar-meta">
          <span><span class="status-dot"></span>接続済み</span>
          <i></i>
          <span>モデル: <span id="modelName">gemma4:31b</span></span>
        </div>
      </header>

      <main>
        <section class="topic-panel">
          <div class="topic-copy">
            <p>テーマ</p>
            <label class="sr-only" for="themeInput">テーマ</label>
            <textarea id="themeInput" rows="1" placeholder="テーマを入力してください"></textarea>
          </div>
          <form id="themeForm" class="topic-controls">
            <div class="round-label"><strong id="progressTitle">Round 1</strong><span id="progressCount">/ 9</span></div>
            <div class="round-progress"><span id="roundProgressBar"></span></div>
            <div class="topic-buttons">
              <button class="primary-button" type="submit" id="startButton">次の発言 <span>›</span></button>
              <button class="outline-button stop-button" type="button" id="stopButton"><b>■</b> 停止</button>
              <button class="outline-button" type="button" id="resetButton">⟳ リセット</button>
            </div>
          </form>
          <div class="theme-context hidden" id="themeContext"></div>
          <div class="hidden-stepper" id="stepper"></div>
        </section>

        <section class="role-grid" aria-label="A・B・Cの発言パネル">
          <article class="role-card role-a">
            <div class="role-header">
              <div class="role-avatar">A</div>
              <div class="role-title"><h2>賛成側</h2><p>テーマを支持する立場</p></div>
              <button class="role-detail-button role-detail-a" type="button" data-speaker="A" disabled>全文</button>
              <span class="role-status" id="statusA"><span class="status-dot"></span>待機中</span>
            </div>
            <div class="role-body" id="bodyA"><p class="empty-state">テーマを入力すると、ここに表示されます。</p></div>
          </article>

          <article class="role-card role-b">
            <div class="role-header">
              <div class="role-avatar">B</div>
              <div class="role-title"><h2>反対側</h2><p>テーマに反対する立場</p></div>
              <button class="role-detail-button role-detail-b" type="button" data-speaker="B" disabled>全文</button>
              <span class="role-status" id="statusB"><span class="status-dot idle-dot"></span>待機中</span>
            </div>
            <div class="role-body" id="bodyB"><p class="empty-state">テーマを入力すると、ここに表示されます。</p></div>
          </article>

          <article class="role-card role-c">
            <div class="role-header">
              <div class="role-avatar">C</div>
              <div class="role-title"><h2>ファシリテーター</h2><p>論点を整理する中立的な進行役</p></div>
              <button class="role-detail-button role-detail-c" type="button" data-speaker="C" disabled>全文</button>
              <span class="role-status" id="statusC"><span class="status-dot idle-dot"></span>待機中</span>
            </div>
            <div class="role-body" id="bodyC"><p class="empty-state">テーマを入力すると、整理結果が表示されます。</p></div>
          </article>
        </section>

        <section class="timeline-card">
          <div class="timeline-list" id="historyList">
            <p class="empty-state">テーマを入力すると、進行履歴が表示されます。</p>
          </div>
          <span class="history-count hidden" id="historyCount">0件</span>
        </section>
      </main>

      <footer class="footer-bar">
        <div class="footer-status">
          <span class="loading-ring" id="footerSpinner"></span>
          <strong id="footerStatus">待機中</strong>
          <span id="footerMessage">テーマを入力して開始してください</span>
        </div>
        <div class="footer-actions">
          <button class="reconnect-button summary-button hidden" type="button" id="summaryButton">まとめを確認</button>
          <button class="reconnect-button" type="button" id="reconnectButton">⟳ 再接続</button>
        </div>
      </footer>

      <dialog id="stageDialog" class="stage-dialog summary-dialog">
        <div class="dialog-heading">
          <div><p>TEACHER DETAIL</p><h2>現在段階の確認</h2></div>
          <button class="dialog-close" id="closeStageDialogButton" type="button" aria-label="閉じる">×</button>
        </div>
        <section id="stageContent" aria-live="polite"></section>
      </dialog>

      <dialog id="messageDialog" class="message-dialog">
        <div class="dialog-heading">
          <div><p>FULL TRANSCRIPT</p><h2 id="messageDialogTitle">発言全文</h2></div>
          <button class="dialog-close" id="closeMessageDialogButton" type="button" aria-label="閉じる">×</button>
        </div>
        <section id="messageDialogContent" aria-live="polite"></section>
      </dialog>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
